<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO List</title>
  <link rel="stylesheet" href="to do list.css">
</head>

<body>
  <!-- 右上角语言栏 -->
  <div class="top-right">
    <span><img src="images/github.png" alt=""></span>
    <span class="author">作者</span>
    <div><a href="#">En</a><span>/</span><a href="#">中</a></div>
  </div>

  <!-- 标题 -->
  <div class="todo-header">
    <img src="images/todo.svg" alt="">
    <div>
      <span></span>
      <span></span>
    </div>
  </div>

  <!-- 输入区域 -->
  <div class="input-area">
    <input type="text" placeholder="新增待办事项...">
    <select class="priority-select">
      <option value="medium">中优先级</option>
      <option value="high">高优先级</option>
      <option value="low">低优先级</option>
    </select>
    <select class="category-select">
      <option value="工作">工作</option>
      <option value="生活">生活</option>
      <option value="学习">学习</option>
    </select>
    <button>提交</button>
  </div>

  <!-- 分类管理 -->
  <div class="category-management">
    <button id="addCategoryBtn">添加分类</button>
    <div class="category-filters">
      <button class="filter-btn active" data-category="all">全部</button>
      <button class="filter-btn" data-category="工作">工作</button>
      <button class="filter-btn" data-category="生活">生活</button>
      <button class="filter-btn" data-category="学习">学习</button>
    </div>
  </div>

  <!-- 主卡片 -->
  <div class="todo-card">
    <div class="card-top">
      <input type="checkbox" class="mark-all">
      <span>全部标为完成</span>
      <button id="sortByPriorityBtn">按优先级排序</button>
      <button id="deleteAllBtn">全部删除</button>
      <div class="slogan">今日事今日毕，勿将今事待明日!☕ </div>
    </div>

    <!-- 待办事项容器-->
    <ul class="card-content" id="todoList">
      <!-- 这里用JS 动态填充 -->
    </ul>

    <!-- 底部统计 -->
    <div class="card-bottom">
      <span id="count">剩余 0 项未完成</span>
    </div>

    <!-- 右侧快捷操作 -->
    <div class="shortcut-switch">
      <div class="filter-btn">关</div>
      <div class="quick-text">快捷操作</div>
    </div>
  </div>

  <!-- 添加分类弹窗 -->
  <div id="categoryModal" class="modal">
    <div class="modal-content">
      <h3>添加分类</h3>
      <input type="text" id="newCategoryInput" placeholder="输入分类名称">
      <div class="modal-buttons">
        <button id="saveCategoryBtn">保存</button>
        <button id="cancelCategoryBtn">取消</button>
      </div>
    </div>
  </div>



  <script>
    //右上角图标变换
    const img = document.querySelector('.top-right img')

    img.addEventListener('mouseenter', function () {
      img.src = 'images/github_1.png';
    })
    img.addEventListener('mouseleave', function () {
      img.src = 'images/github.png';
    })
    //切换语言
    const language = document.querySelectorAll('.top-right a')
    for (let i of language) {
      i.addEventListener('focus', function () {
        i.style.fontWeight = 'bold';
      })
    }

    //卡片头部尾部背景颜色变化
    const inputArea = document.querySelector('.input-area')
    inputArea.addEventListener('mouseenter', function () {
      inputArea.style.boxShadow = 'none';
      inputArea.style.transition = 'box-shadow 0.3s ease-in-out';
    })
    inputArea.addEventListener('mouseleave', function () {
      inputArea.style.boxShadow = '4px 4px 0 0 black';
    })
    const shortcutSwitch = document.querySelector('.shortcut-switch')
    shortcutSwitch.addEventListener('mouseenter', function () {
      shortcutSwitch.style.boxShadow = 'none';
      shortcutSwitch.style.transition = 'box-shadow 0.3s ease-in-out';
    })
    shortcutSwitch.addEventListener('mouseleave', function () {
      shortcutSwitch.style.boxShadow = '3px 3px 0 #333';
      shortcutSwitch.style.transition = 'box-shadow 0.3s ease-in-out';
    })

    //新增待办事项
    const input = document.querySelector('.input-area input')
    const submitBtn = document.querySelector('button')
    const markAll = document.querySelector('.mark-all')

    submitBtn.addEventListener('click', function () {
      addTodo()
    })
    input.addEventListener('keyup', function (e) {
      if (e.key === 'Enter') {
        addTodo()
      }
    })

    //全选控制
    markAll.addEventListener('click', function () {
      const allCheckboxes = document.querySelectorAll('.ck');
      for (let i = 0; i < allCheckboxes.length; i++) {
        allCheckboxes[i].checked = markAll.checked;
      }
      updateCount();
    })

    //处理复选框点击事件
    function handleCheckboxClick() {
      const allCheckboxes = document.querySelectorAll('.ck');
      markAll.checked = document.querySelectorAll('.ck:checked').length === allCheckboxes.length;
      updateCount();
    }

    //处理删除按钮点击事件
    function handleDeleteClick(e) {
      const todoItem = e.target.closest('.todo-item');
      if (todoItem) {
        todoItem.remove();
        updateCount();
        // 更新全选状态
        const allCheckboxes = document.querySelectorAll('.ck');
        markAll.checked = allCheckboxes.length > 0 && document.querySelectorAll('.ck:checked').length === allCheckboxes.length;
      }
    }

    //为所有元素添加事件监听器
    function addEventListeners() {
      //为所有复选框添加点击事件
      const allCheckboxes = document.querySelectorAll('.ck');
      allCheckboxes.forEach(checkbox => {
        checkbox.addEventListener('click', handleCheckboxClick);
      });

      //为所有删除按钮添加点击事件
      const deleteButtons = document.querySelectorAll('.delete');
      deleteButtons.forEach(button => {
        button.addEventListener('click', handleDeleteClick);
      });
    }

    // 全局变量
    let categories = ['工作', '生活', '学习'];
    let currentFilter = 'all';

    // 初始化
    function init() {
      addEventListeners();
      updateCount();
      updateCategoryFilters();
    }

    function addTodo() {
      //拿到输入框的内容
      const text = input.value.trim()
      //空的话就不执行
      if (text === '') {
        return
      }

      // 获取优先级和分类
      const priority = document.querySelector('.priority-select').value;
      const category = document.querySelector('.category-select').value;

      //把text插入到待办事项容器里
      const todoList = document.querySelector('#todoList')
      const content = document.createElement('li')
      content.classList.add('todo-item')
      content.classList.add(`priority-${priority}`)
      content.dataset.category = category;
      content.dataset.priority = priority;
      content.innerHTML = `
  <input type="checkbox" class="ck">
  <span class="text">${text}</span>
  <span class="category-tag">${category}</span>
  <button class="delete">×</button>
`
      //清空输入框
      input.value = ''

      //插入到列表最上方
      todoList.insertBefore(content, todoList.children[0]);

      //为新添加的元素添加事件监听器
      const newCheckbox = content.querySelector('.ck');
      newCheckbox.addEventListener('click', handleCheckboxClick);

      const newDeleteBtn = content.querySelector('.delete');
      newDeleteBtn.addEventListener('click', handleDeleteClick);

      // 应用过滤器
      applyFilter();
      updateCount();
    }

    // 按优先级排序
    function sortByPriority() {
      const todoList = document.querySelector('#todoList');
      const todoItems = Array.from(todoList.children);

      // 优先级排序：高 > 中 > 低
      const priorityOrder = { high: 0, medium: 1, low: 2 };
      todoItems.sort((a, b) => {
        return priorityOrder[a.dataset.priority] - priorityOrder[b.dataset.priority];
      });

      // 重新插入排序后的元素
      todoItems.forEach(item => {
        todoList.appendChild(item);
      });
    }

    // 应用分类过滤器
    function applyFilter() {
      const todoItems = document.querySelectorAll('.todo-item');
      todoItems.forEach(item => {
        if (currentFilter === 'all' || item.dataset.category === currentFilter) {
          item.style.display = 'flex';
        } else {
          item.style.display = 'none';
        }
      });
      updateCount();
    }

    // 更新分类过滤器按钮
    function updateCategoryFilters() {
      const filterContainer = document.querySelector('.category-filters');
      // 保留"全部"按钮
      const allButton = filterContainer.querySelector('[data-category="all"]');
      filterContainer.innerHTML = '';
      filterContainer.appendChild(allButton);

      // 添加分类按钮
      categories.forEach(category => {
        const button = document.createElement('button');
        button.className = 'filter-btn';
        button.dataset.category = category;
        button.textContent = category;
        button.addEventListener('click', function () {
          // 移除所有按钮的active类
          document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.remove('active');
          });
          // 添加当前按钮的active类
          this.classList.add('active');
          // 更新当前过滤器
          currentFilter = this.dataset.category;
          // 应用过滤器
          applyFilter();
        });
        filterContainer.appendChild(button);
      });

      // 更新分类选择下拉框
      const categorySelect = document.querySelector('.category-select');
      categorySelect.innerHTML = '';
      categories.forEach(category => {
        const option = document.createElement('option');
        option.value = category;
        option.textContent = category;
        categorySelect.appendChild(option);
      });
    }

    // 添加分类
    function addCategory() {
      const modal = document.getElementById('categoryModal');
      modal.style.display = 'block';
    }

    // 保存分类
    function saveCategory() {
      const newCategory = document.getElementById('newCategoryInput').value.trim();
      if (newCategory && !categories.includes(newCategory)) {
        categories.push(newCategory);
        updateCategoryFilters();
        document.getElementById('newCategoryInput').value = '';
        document.getElementById('categoryModal').style.display = 'none';
      }
    }

    // 取消添加分类
    function cancelAddCategory() {
      document.getElementById('newCategoryInput').value = '';
      document.getElementById('categoryModal').style.display = 'none';
    }

    function updateCount() {
      let allCount = document.querySelectorAll('.ck').length
      //统计完成的项
      let completedCount = document.querySelectorAll('.ck:checked').length
      //统计未完成的项
      let uncompletedCount = allCount - completedCount
      document.querySelector('#count').innerHTML = `剩余 ${uncompletedCount} 项未完成`
    }

    // 全部删除功能
    function deleteAll() {
      if (confirm('确定要删除所有待办事项吗？')) {
        const todoList = document.querySelector('#todoList');
        todoList.innerHTML = '';
        updateCount();
        markAll.checked = false;
      }
    }

    // 添加新的事件监听器
    function addNewEventListeners() {
      // 按优先级排序按钮
      document.getElementById('sortByPriorityBtn').addEventListener('click', sortByPriority);
      
      // 全部删除按钮
      document.getElementById('deleteAllBtn').addEventListener('click', deleteAll);
      
      // 添加分类按钮
      document.getElementById('addCategoryBtn').addEventListener('click', addCategory);
      
      // 保存分类按钮
      document.getElementById('saveCategoryBtn').addEventListener('click', saveCategory);
      
      // 取消添加分类按钮
      document.getElementById('cancelCategoryBtn').addEventListener('click', cancelAddCategory);
      
      // 分类过滤器按钮
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          // 移除所有按钮的active类
          document.querySelectorAll('.filter-btn').forEach(b => {
            b.classList.remove('active');
          });
          // 添加当前按钮的active类
          this.classList.add('active');
          // 更新当前过滤器
          currentFilter = this.dataset.category;
          // 应用过滤器
          applyFilter();
        });
      });
    }

    // 重写addEventListeners函数
    function addEventListeners() {
      //为所有复选框添加点击事件
      const allCheckboxes = document.querySelectorAll('.ck');
      allCheckboxes.forEach(checkbox => {
        checkbox.addEventListener('click', handleCheckboxClick);
      });

      //为所有删除按钮添加点击事件
      const deleteButtons = document.querySelectorAll('.delete');
      deleteButtons.forEach(button => {
        button.addEventListener('click', handleDeleteClick);
      });

      // 添加新的事件监听器
      addNewEventListeners();
    }

    // 重写updateCount函数
    function updateCount() {
      let allCount = 0;
      let completedCount = 0;

      // 只计算当前过滤器下的待办事项
      const todoItems = document.querySelectorAll('.todo-item');
      todoItems.forEach(item => {
        if (item.style.display !== 'none') {
          allCount++;
          if (item.querySelector('.ck').checked) {
            completedCount++;
          }
        }
      });

      //统计未完成的项
      let uncompletedCount = allCount - completedCount;
      document.querySelector('#count').innerHTML = `剩余 ${uncompletedCount} 项未完成`;
    }

    // 重写handleDeleteClick函数
    function handleDeleteClick(e) {
      const todoItem = e.target.closest('.todo-item');
      if (todoItem) {
        todoItem.remove();
        applyFilter();
        updateCount();
        // 更新全选状态
        const allCheckboxes = document.querySelectorAll('.ck');
        markAll.checked = allCheckboxes.length > 0 && document.querySelectorAll('.ck:checked').length === allCheckboxes.length;
      }
    }

    // 初始化
    init();



  </script>
</body>

</html>
